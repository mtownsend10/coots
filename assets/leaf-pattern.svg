<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" viewBox="0 0 480 480">
  <!-- Reusable tileable tropical-leaf print. Pure silhouettes at low opacity:
       drop it over any colored background as a CSS background-image layer and
       it darkens the base color into a soft leaf texture. -->
  <defs>
    <!-- Long pointed leaf blade (ti / banana style). Anchored at the base; tip
         extends upward to y = -138. -->
    <path id="lp-blade" fill="#000"
          d="M0 0 Q18 -28 18 -72 Q14 -120 0 -138 Q-14 -120 -18 -72 Q-18 -28 0 0 Z"/>

    <!-- Palm frond: a curved stem with feather-like fingers either side. -->
    <g id="lp-frond">
      <path d="M0 0 Q4 -45 0 -130" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round"/>
      <ellipse fill="#000" cx="-13" cy="-25" rx="18" ry="5.5" transform="rotate(-22 -13 -25)"/>
      <ellipse fill="#000" cx="-20" cy="-50" rx="24" ry="6.5" transform="rotate(-32 -20 -50)"/>
      <ellipse fill="#000" cx="-22" cy="-78" rx="25" ry="6.5" transform="rotate(-44 -22 -78)"/>
      <ellipse fill="#000" cx="-18" cy="-104" rx="20" ry="5.5" transform="rotate(-54 -18 -104)"/>
      <ellipse fill="#000" cx="13" cy="-25" rx="18" ry="5.5" transform="rotate(22 13 -25)"/>
      <ellipse fill="#000" cx="20" cy="-50" rx="24" ry="6.5" transform="rotate(32 20 -50)"/>
      <ellipse fill="#000" cx="22" cy="-78" rx="25" ry="6.5" transform="rotate(44 22 -78)"/>
      <ellipse fill="#000" cx="18" cy="-104" rx="20" ry="5.5" transform="rotate(54 18 -104)"/>
    </g>

    <!-- Monstera: oval blade with finger-like slits cut from each side.
         evenodd fill rule turns inner triangles into holes. -->
    <path id="lp-monstera" fill="#000" fill-rule="evenodd"
          d="M0 0 Q56 -18 68 -70 Q56 -130 0 -148 Q-56 -130 -68 -70 Q-56 -18 0 0 Z
             M-58 -32 L-24 -45 L-55 -56 Z
             M-62 -76 L-24 -86 L-58 -98 Z
             M58 -32 L24 -45 L55 -56 Z
             M62 -76 L24 -86 L58 -98 Z
             M-54 -112 L-22 -118 L-50 -128 Z
             M54 -112 L22 -118 L50 -128 Z"/>
  </defs>

  <g opacity="0.17">
    <use href="#lp-frond" transform="translate(110 180) rotate(25)"/>
    <use href="#lp-monstera" transform="translate(310 260) rotate(-15) scale(0.8)"/>
    <use href="#lp-blade" transform="translate(180 410) rotate(-40) scale(0.95)"/>
    <use href="#lp-blade" transform="translate(360 145) rotate(28) scale(0.85)"/>
    <use href="#lp-blade" transform="translate(70 330) rotate(85) scale(0.75)"/>
    <use href="#lp-blade" transform="translate(380 380) rotate(120) scale(0.7)"/>
    <use href="#lp-frond" transform="translate(80 470) rotate(-22) scale(0.65)"/>
    <use href="#lp-blade" transform="translate(260 95) rotate(-10) scale(0.65)"/>
    <use href="#lp-blade" transform="translate(420 250) rotate(70) scale(0.6)"/>
    <use href="#lp-monstera" transform="translate(180 230) rotate(95) scale(0.5)"/>
  </g>
</svg>
